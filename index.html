<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πρόγραμμα Φροντιστηρίου</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        #main-container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .instruction-note { text-align: center; color: #e74c3c; font-weight: bold; margin-bottom: 25px; font-size: 0.95em; }
        
        .user-info { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 250px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input, .input-group textarea { 
            width: 100%; padding: 12px; border: 2px solid #e1e8ed; border-radius: 8px; box-sizing: border-box; 
            text-transform: uppercase; /* Οπτική μετατροπή σε κεφαλαία */
        }

        .schedule-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .day-column { flex: 1; min-width: 200px; border: 1px solid #e1e8ed; border-radius: 10px; padding: 15px; }
        .day-header { text-align: center; font-weight: bold; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-bottom: 10px; }
        .select-all-btn { background: #f8f9fa; cursor: pointer; display: block; margin-bottom: 15px; text-align: center; padding: 8px; border-radius: 6px; font-size: 0.85em; border: 1px solid #ddd; }
        
        .hour-option { margin-bottom: 8px; position: relative; }
        .hour-option input { position: absolute; opacity: 0; }
        .hour-label { display: block; border: 1px solid #e1e8ed; padding: 10px; border-radius: 6px; cursor: pointer; text-align: center; font-size: 0.9em; transition: 0.2s; }
        .hour-option input:checked + .hour-label { background-color: #3498db; color: white; border-color: #2980b9; }

        .submit-btn {
            background-color: #2ecc71; color: white; border: none; padding: 15px 50px;
            font-size: 1.1em; font-weight: bold; border-radius: 30px; cursor: pointer; 
            width: 100%; margin-top: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .submit-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .spinner {
            display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #thanks-message { display: none; text-align: center; padding: 50px; }
        #thanks-message h1 { color: #2ecc71; }
    </style>
</head>
<body>

<div id="main-container">
    <form id="scheduleForm" action="https://script.google.com/macros/s/AKfycbxSBRSp1c_1rtsWogDzCjaF0wppHxgaGcXdSEEBxt0FlfGIVeTHYqOu7VmYf02P_2Ax/exec" method="POST">
        <h2>Δήλωση ΜΗ Διαθεσιμότητας</h2>
        <p class="instruction-note">⚠️ ΠΑΡΑΚΑΛΟΥΜΕ ΧΡΗΣΙΜΟΠΟΙΕΙΣΤΕ ΜΟΝΟ ΕΛΛΗΝΙΚΟΥΣ ΚΕΦΑΛΑΙΟΥΣ ΧΑΡΑΚΤΗΡΕΣ ΧΩΡΙΣ ΤΟΝΟΥΣ</p>
        
        <div class="user-info">
            <div class="input-group">
                <label>ΕΠΙΘΕΤΟ *</label>
                <input type="text" name="lastname" placeholder="Π.Χ. ΠΑΠΑΔΟΠΟΥΛΟΣ" 
                       oninput="this.value = this.value.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^Α-Ω\s]/g, '')" 
                       required>
            </div>
            <div class="input-group">
                <label>ΟΝΟΜΑ *</label>
                <input type="text" name="firstname" placeholder="Π.Χ. ΙΩΑΝΝΗΣ" 
                       oninput="this.value = this.value.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^Α-Ω\s]/g, '')" 
                       required>
            </div>
        </div>

        <div class="schedule-grid">
            <script>
                const dayNames = ['Δευτέρα', 'Τρίτη', 'Τετάρτη', 'Πέμπτη', 'Παρασκευή', 'Σάββατο'];
                const dayKeys = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
                dayNames.forEach((day, i) => {
                    document.write(`
                        <div class="day-column">
                            <div class="day-header">${day}</div>
                            <span class="select-all-btn" onclick="toggleDay('${dayKeys[i]}')">🔄 Όλη η μέρα</span>
                            ${[15, 16, 17, 18, 19, 20].map(h => `
                                <div class="hour-option">
                                    <input type="checkbox" class="${dayKeys[i]}" name="${dayKeys[i]}${h}" id="${dayKeys[i]}${h}">
                                    <label class="hour-label" for="${dayKeys[i]}${h}">${h}:00 - ${h+1}:00</label>
                                </div>
                            `).join('')}
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="input-group" style="margin-top:20px;">
            <label>ΣΧΟΛΙΑ</label>
            <textarea name="comments" rows="3" placeholder="ΕΠΙΠΛΕΟΝ ΠΑΡΑΤΗΡΗΣΕΙΣ..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <span class="spinner" id="btnSpinner"></span>
            <span id="btnText">ΥΠΟΒΟΛΗ ΠΡΟΤΙΜΗΣΕΩΝ</span>
        </button>
    </form>

    <div id="thanks-message">
        <h1>✔ΕΥΧΑΡΙΣΤΟΥΜΕ!</h1>
        <p>Οι προτιμήσεις σας υποβλήθηκαν με επιτυχία.</p>
        <p>Θα ενημερωθείτε σύντομα για το τελικό πρόγραμμα.</p>
    </div>
</div>

<script>
    function toggleDay(dayClass) {
        let checkboxes = document.getElementsByClassName(dayClass);
        let allChecked = Array.from(checkboxes).every(cb => cb.checked);
        for(let cb of checkboxes) { cb.checked = !allChecked; }
    }

    document.getElementById('scheduleForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const spinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');

        // Κλείδωμα κουμπιού
        btn.disabled = true;
        spinner.style.display = "inline-block";
        btnText.innerHTML = "ΠΑΡΑΚΑΛΩ ΠΕΡΙΜΕΝΕΤΕ ΜΙΣΟ ΛΕΠΤΟ...";

        fetch(e.target.action, {
            method: 'POST',
            body: new FormData(e.target),
            mode: 'no-cors'
        })
        .then(() => {
            document.getElementById('scheduleForm').style.display = 'none';
            document.getElementById('thanks-message').style.display = 'block';
            window.scrollTo(0,0);
        })
        .catch(error => {
            alert("Σφάλμα κατά την υποβολή: " + error);
            btn.disabled = false;
            spinner.style.display = "none";
            btnText.innerHTML = "ΥΠΟΒΟΛΗ ΠΡΟΤΙΜΗΣΕΩΝ";
        });
    };
</script>
</body>
</html>
